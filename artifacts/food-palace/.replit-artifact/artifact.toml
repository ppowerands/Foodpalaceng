kind = "web"
previewPath = "/"
title = "Food Palace Restaurant"
version = "1.0.0"
id = "artifacts/food-palace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23319

[services.development]
run = "pnpm --filter @workspace/food-palace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/food-palace", "run", "build" ]
publicDir = "artifacts/food-palace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23319"
BASE_PATH = "/"
